name: AccuKnox DAST Customer Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dast-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install application dependencies
        run: |
          pip install -r requirements.txt

      - name: Start web application
        run: |
          nohup python app/main.py > app.log 2>&1 &
          sleep 10
          curl -I http://127.0.0.1:5000 || cat app.log

      - name: Run AccuKnox DAST Scan
        uses: accuknox/dast-scan-action@latest
        with:
          target_url: "http://127.0.0.1:5000"
          accuknox_endpoint: ${{ secrets.ACCUKNOX_ENDPOINT }}
          accuknox_token: ${{ secrets.ACCUKNOX_TOKEN }}
          accuknox_label: ${{ secrets.ACCUKNOX_LABEL }}
          severity_threshold: "HIGH"
          dast_scan_type: "full-scan"
